<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Mirror frame -->
  <rect x="40" y="40" width="160" height="160" rx="20" fill="none" stroke="url(#g)" stroke-width="4"/>
  <ellipse cx="120" cy="120" rx="45" ry="55" fill="url(#g)" opacity="0.15"/>
  <ellipse cx="120" cy="120" rx="45" ry="55" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <ellipse cx="120" cy="105" rx="20" ry="18" fill="url(#g)" opacity="0.4"/>
  <!-- Reflection lines -->
  <line x1="85" y1="145" x2="155" y2="145" stroke="url(#g)" stroke-width="2" opacity="0.5"/>
  <line x1="95" y1="155" x2="145" y2="155" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
  <!-- Arrow right -->
  <line x1="210" y1="120" x2="270" y2="120" stroke="#6366F1" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="270,112 285,120 270,128" fill="url(#g)"/>
  <!-- Clone frame -->
  <rect x="295" y="40" width="160" height="160" rx="20" fill="none" stroke="url(#g)" stroke-width="4" stroke-dasharray="8,4"/>
  <ellipse cx="375" cy="120" rx="45" ry="55" fill="url(#g)" opacity="0.08"/>
  <ellipse cx="375" cy="105" rx="20" ry="18" fill="url(#g)" opacity="0.25"/>
  <line x1="340" y1="145" x2="410" y2="145" stroke="url(#g)" stroke-width="2" opacity="0.3"/>
  <!-- Deploy arrow -->
  <line x1="465" y1="120" x2="525" y2="120" stroke="#6366F1" stroke-width="3"/>
  <polygon points="525,112 540,120 525,128" fill="url(#g)"/>
  <!-- Docker whale -->
  <rect x="550" y="65" width="120" height="90" rx="8" fill="none" stroke="#2496ED" stroke-width="3"/>
  <rect x="550" y="65" width="120" height="20" rx="8" fill="#2496ED" opacity="0.15"/>
  <rect x="555" y="70" width="10" height="8" rx="2" fill="#2496ED" opacity="0.4"/>
  <rect x="575" y="70" width="10" height="8" rx="2" fill="#2496ED" opacity="0.4"/>
  <rect x="595" y="70" width="10" height="8" rx="2" fill="#2496ED" opacity="0.4"/>
  <line x1="570" y1="100" x2="680" y2="100" stroke="#2496ED" stroke-width="1.5" opacity="0.4"/>
  <text x="610" y="125" font-family="Courier New, monospace" font-size="11" fill="#2496ED" text-anchor="middle">docker run</text>
  <!-- VPS -->
  <text x="610" y="155" font-family="Courier New, monospace" font-size="11" fill="#10B981" text-anchor="middle">ssh + compose</text>
  <!-- Title -->
  <text x="540" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="url(#g)" text-anchor="middle" letter-spacing="2">HERMES MIRROR</text>
  <!-- Tagline -->
  <text x="540" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle" letter-spacing="1">Sub-Agent Mirroring  ·  One Click Deploy</text>
</svg>
